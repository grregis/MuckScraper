<!DOCTYPE html>
<html data-theme="light">
<head>
    <title>Login — MuckScraper</title>
    <style>
        :root {
            --accent: #a43cb5;
            --bg: #f8f9fa;
            --surface: #ffffff;
            --text: #1a1a1a;
            --text-muted: #555;
            --border: #eef0f2;
            --shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        [data-theme="dark"] {
            --bg: #0f0f17;
            --surface: #1a1a26;
            --text: #e2e8f0;
            --text-muted: #a0aec0;
            --border: #2d2d3f;
            --shadow: 0 4px 12px rgba(0,0,0,0.25);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .login-card {
            background: var(--surface);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
        }
        h1 { font-size: 24px; font-weight: 800; color: var(--accent); margin-bottom: 8px; text-align: center; }
        p.subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 32px; text-align: center; }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: var(--text-muted); }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 15px;
        }
        input:focus { outline: none; border-color: var(--accent); }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 12px;
        }
        .btn:hover { opacity: 0.9; }
        
        .flash {
            background: #f38ba8;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 24px;
            text-align: center;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="login-card">
    <h1>MuckScraper</h1>
    <p class="subtitle">Please sign in to access admin tools</p>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" required autofocus>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>
        <div class="form-group">
            <label class="remember-me">
                <input type="checkbox" name="remember"> Remember Me
            </label>
        </div>
        <button type="submit" class="btn">Sign In</button>
    </form>
</div>

<script>
    const savedTheme = localStorage.getItem('muckscraper-theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);
</script>
</body>
</html>
